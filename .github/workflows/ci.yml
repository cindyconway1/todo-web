name: CI
on:
  pull_request: { types: [opened, synchronize] }
  push: { branches: [main] }
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci

        # Download the latest OpenAPI schema from the backend release
      - name: Download OpenAPI schema from backend
        run: |
          mkdir -p schema
          curl -L https://github.com/cindyconway1/todo-agentic-poc/releases/download/api-schema-latest/ToDo.Api.json -o schema/ToDo.Api.json 2>/dev/null || {
            echo "⚠ Schema download failed, using fallback"
            touch schema/ToDo.Api.json
          }

      # Regenerate API types from the downloaded schema
      - run: npm run gen:api

      - run: npm run lint
      - run: npm run test:unit # Vitest, API calls mocked
      - run: npm run build
