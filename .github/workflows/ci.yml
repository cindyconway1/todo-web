name: CI
on:
  pull_request: { types: [opened, synchronize] }
  push: { branches: [main] }
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set up Node, install deps, fetch the backend's published OpenAPI contract,
      # and regenerate the typed client so the build type-checks against the latest
      # contract. Shared with claude.yml via a composite action.
      - uses: ./.github/actions/regen-api-client

      - run: npm run lint
      - run: npm run test:unit # Vitest, API calls mocked
      - run: npm run build
