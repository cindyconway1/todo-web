name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Serialize @claude runs per PR/issue so overlapping runs don't push at the
# same time and clobber each other's commits (what caused the conflicts this
# branch exists to fix). A new run queues behind the in-progress one instead
# of cancelling it mid-work. Keyed on the PR/issue number, which is a stable
# proxy for the branch being worked on; the run_id fallback keeps unrelated
# runs from ever sharing a group.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write # write so the failure step below can comment on the issue/PR
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Fetch the backend contract and regenerate the typed client BEFORE the agent
      # runs, so it works against the latest API instead of the checked-in (possibly
      # stale) schema.d.ts. Shared with ci.yml via a composite action.
      - id: regen
        uses: ./.github/actions/regen-api-client

      # If setup/fetch/regen failed, stop the run (the agent below is skipped because
      # the job is already failing) and tell the issue why — don't let the agent
      # silently hand-author against a stale or incomplete contract.
      - name: Report contract-fetch failure on the issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            if (!issue_number) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                '⚠️ **@claude did not run — the backend API contract could not be fetched.**',
                '',
                'The typed client (`src/api/schema.d.ts`) is regenerated from the backend\'s',
                '`api-schema-latest` release in `cindyconway1/todo-agentic-poc`. That download or',
                '`npm run gen:api` failed, so the workflow stopped rather than let the agent work',
                'against a stale or incomplete contract.',
                '',
                `See the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for the underlying error.`,
              ].join('\n'),
            });

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # TEMP: surface the full model output so the real turn-1 error (usage
          # limit vs. expired/wrong-account token) is visible in the run log.
          # Remove once the @claude runs are producing PRs again.
          show_full_output: true

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Pin the coding model to Fable 5 and grant the npm commands the agent needs
          # to install deps + run lint / test:unit / build. --allowedTools is ADDITIVE:
          # the base git/GitHub tools are always included, so we don't re-list them here.
          # (The .claude/settings.json permissions are NOT honored by the action's gate.)
          #
          # Conflict self-healing: grant `git fetch` (+ the reset/rebase it feeds) but
          # DISALLOW `git pull`/`git merge`, so the agent reconciles a diverged branch
          # explicitly (fetch, then rebase onto — or reset --hard to — origin) instead
          # of an open-ended merge that can silently entangle another run's commits.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          claude_args: |
            --model claude-fable-5
            --allowedTools "Bash(npm:*),Bash(npx:*),Bash(git fetch:*),Bash(git reset:*),Bash(git rebase:*)"
            --disallowedTools "Bash(git pull:*),Bash(git merge:*)"
            --append-system-prompt "When a push is rejected because your branch has diverged from its remote (e.g. another @claude run pushed in the meantime), reconcile explicitly — never with `git pull` or `git merge`. Run `git fetch origin`, then `git rebase origin/<current-branch>` to replay your commits on top of the latest remote (resolve conflicts, then `git rebase --continue`). Use `git reset --hard origin/<current-branch>` only when you deliberately intend to discard local commits and let the remote win. Substitute the branch you are working on for <current-branch>."

